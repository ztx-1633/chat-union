<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试按钮点击</title>
    <style>
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>测试按钮点击</h1>
    <button id="testButton" onclick="alert('按钮被点击！');">测试按钮</button>
    
    <script>
        // 全局点击事件监听器
        document.addEventListener('click', function(e) {
            console.log('全局点击事件捕获');
            console.log('点击目标:', e.target);
        }, true);
        
        // 直接绑定事件
        const testButton = document.getElementById('testButton');
        testButton.addEventListener('click', function() {
            console.log('addEventListener点击事件触发');
        });
    </script>
</body>
</html>
