<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #settingsButton {
            position: relative;
            z-index: 1000;
            cursor: pointer;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 20px;
        }
    </style>
</head>
<body>
    <h1>最小测试</h1>
    <div id="settingsButton">⚙️</div>
    
    <script>
        // 绑定点击事件
        const settingsButton = document.getElementById('settingsButton');
        console.log('设置按钮元素:', settingsButton);
        
        settingsButton.addEventListener('click', function() {
            console.log('设置按钮被点击');
            alert('设置按钮被点击！');
        });
        
        // 直接设置onclick属性
        settingsButton.onclick = function() {
            console.log('设置按钮被点击 (onclick属性)');
            alert('设置按钮被点击！');
        };
        
        console.log('事件监听器已绑定');
    </script>
</body>
</html>
